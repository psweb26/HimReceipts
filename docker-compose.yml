version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: himachal_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: "himachal_accountability"
      POSTGRES_USER: "gov_admin"
      POSTGRES_PASSWORD: "SecretGovPassword2026"
    volumes:
      - himachal_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gov_admin -d himachal_accountability"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - himachal_network
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    container_name: himachal_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql://gov_admin:SecretGovPassword2026@db:5432/himachal_accountability"
      MUNICIPAL_REGION: "HIMACHAL_PRADESH"
      MONSOON_COMMAND_STATE: "ACTIVE"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - himachal_network
    volumes:
      - ./backend:/app  

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: himachal_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:5173"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - himachal_network
    environment:
      VITE_API_BASE_URL: "http://backend:8000"
    volumes: 
      - ./frontend:/app
      - /app/node_modules

networks:
  himachal_network:
    driver: bridge

volumes:
  himachal_postgres_data:
    driver: local